<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጥቆማ መላኪያ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; }
        .form-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
        input, textarea { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .send-btn { width: 95%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .back-btn { display: inline-block; margin-top: 15px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
<div class="form-box">
    <h2>🔴 የወንጀል ጥቆማ መላኪያ</h2>
    <input type="text" id="subject" placeholder="የጉዳዩ ርዕስ">
    <textarea id="detail" rows="5" placeholder="ዝርዝር መረጃ እዚህ ይጻፉ..."></textarea>
    <button class="send-btn" onclick="sendTip()">ጥቆማውን ላክ</button>
    <br>
    <a href="index.html" class="back-btn">⬅️ ወደ ኋላ ተመለስ</a>
</div>

<script>
    async function sendTip() {
        const token = "8405421128:AAEX7lRd1Q0unboIvb1FIthAIH0QCR7iJXA";
        const chatId = "-1003878859973";
        const subject = document.getElementById("subject").value;
        const detail = document.getElementById("detail").value;

        if(!subject || !detail) { alert("እባክዎ መረጃ ይሙሉ"); return; }

        const message = `🚨 **አዲስ ጥቆማ** 🚨\n\n📌 **ርዕስ:** ${subject}\n📝 **ዝርዝር:** ${detail}`;
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

        try {
            await fetch(url);
            alert("ጥቆማው ደርሷል!");
            window.location.href = "index.html";
        } catch (e) { alert("ስህተት ተፈጥሯል"); }
    }
</script>
</body>
</html>
