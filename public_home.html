<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጥቆማ መላኪያ</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; }
        .form-box { background: white; padding: 20px; border-radius: 15px; max-width: 350px; margin: auto; }
        input, textarea { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .send-btn { width: 95%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="form-box">
    <h2>🚨 የወንጀል ጥቆማ</h2>
    <input type="text" id="subject" placeholder="ርዕስ">
    <textarea id="detail" rows="4" placeholder="ዝርዝር መረጃ..."></textarea>
    <button class="send-btn" onclick="sendToTelegram()">ጥቆማውን ላክ</button>
    <br><br><a href="index.html">⬅️ ተመለስ</a>
</div>
<script>
    async function sendToTelegram() {
        const token = "8405421128:AAEX7lRd1Q0unboIvb1FIthAIH0QCR7iJXA";
        const chatId = "-1003878859973";
        const sub = document.getElementById("subject").value;
        const det = document.getElementById("detail").value;
        if(!sub || !det) { alert("መረጃ ይሙሉ"); return; }
        const msg = `🚨 አዲስ ጥቆማ:\n📌 ርዕስ: ${sub}\n📝 ዝርዝር: ${det}`;
        await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
        alert("ጥቆማው ተልኳል!");
        window.location.href = "index.html";
    }
</script>
</body>
</html>
