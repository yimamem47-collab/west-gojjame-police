<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የምዕራብ ጎጃም ፖሊስ</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #e9ecef; margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        .container { background: white; width: 85%; max-width: 400px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .logo { width: 100px; margin-bottom: 15px; }
        h2 { color: #003366; margin-bottom: 25px; font-size: 22px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 15px 0; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .public-btn { background-color: #28a745; color: white; }
        .police-btn { background-color: #0056b3; color: white; }
        .public-btn:hover { background-color: #218838; }
        .police-btn:hover { background-color: #004494; }
        .footer { font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/af/Flag_of_Ethiopia.svg/255px-Flag_of_Ethiopia.svg.png" alt="Logo" class="logo">
    <h2>የምዕራብ ጎጃም ዞን ፖሊስ መምሪያ</h2>
    
    <a href="public_home.html" class="btn public-btn">🔴 ለህዝብ ጥቆማና መረጃ</a>

    <a href="login.html" class="btn police-btn">🔵 ለፖሊስ አባላት (Login)</a>

    <div class="footer">
        ፈጣን ጥቆማ | የትራፊክ አደጋ | የወንጀል መረጃ
    </div>
</div>

</body>
</html>
<button onclick="window.location.href='index.html'" style="background-color: #6c757d; color: white; padding: 10px; border: none; border-radius: 5px; margin-top: 20px;">
    ⬅️ ወደ ዋናው ምርጫ ተመለስ
</button>
