<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ጥቆማ መላኪያ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; }
        .form-box { background: white; padding: 25px; border-radius: 15px; max-width: 400px; margin: auto; }
        input, textarea { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .send-btn { width: 95%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
<div class="form-box">
    <h2>🔴 የጥቆማ መላኪያ ቅጽ</h2>
    <input type="text" id="subject" placeholder="የጉዳዩ ርዕስ">
    <textarea id="detail" rows="4" placeholder="ዝርዝር መረጃ..."></textarea>
    <button class="send-btn" onclick="alert('ጥቆማው ደርሷል!')">ላክ</button>
    <br><br>
    <a href="index.html">⬅️ ተመለስ</a>
</div>
</body>
</html>
