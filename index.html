<script>
    async function sendTip() {
        const token = "8405421128:AAEX7lRd1Q0unboIvb1FIthAIH0QCR7iJXA";
        const chatId = "-1003878859973";
        
        const subject = document.getElementById("subject").value;
        const detail = document.getElementById("detail").value;

        if(subject === "" || detail === "") {
            alert("እባክዎ መጀመሪያ መረጃውን ይሙሉ!");
            return;
        }

        // ለቴሌግራም የሚላከው ጽሑፍ አቀራረብ
        const message = `🚨 **አዲስ የወንጀል ጥቆማ ደርሷል** 🚨\n\n📌 **ርዕስ:** ${subject}\n📝 **ዝርዝር መረጃ:** ${detail}\n📅 **ቀን:** ${new Date().toLocaleString('am-ET')}`;

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

        try {
            const response = await fetch(url);
            if(response.ok) {
                alert("ጥቆማው ለፖሊስ መምሪያው በምስጢር ደርሷል! እናመሰግናለን።");
                document.getElementById("subject").value = "";
                document.getElementById("detail").value = "";
            } else {
                alert("መረጃውን መላክ አልተቻለም። እባክዎ በድጋሚ ይሞክሩ።");
            }
        } catch (error) {
            alert("የኔትወርክ ችግር አጋጥሟል። ኔትወርክዎን ያረጋግጡ።");
        }
    }
</script>
