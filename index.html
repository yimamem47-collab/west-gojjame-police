<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlllV2VzdCBHb2pqYW0gUG9saWNlIiwKICAic2hvcnRfbmFtZSI6ICJQb2xpY2UgQXBwIiwKICAic3RhcnRfdXJsIjogIi4vIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjMDAyQjVCIiwKICAidGhlbWVfY29sb3IiOiAiIzAwMkI1QiIsCiAgImljb25zIjogW3sgInNyYyI6ICJodHRwczovL2ltZy5pY29uczguY29tL2NvbG9yLzE5Mi9wb2xpY2UtYmFkZ2UucG5nIiwgInR5cGUiOiAiaW1hZ2UvcG5nIiwgInNpemVzIjogIjE5MngxOTIiIH1dCn0=">
    <meta name="theme-color" content="#002B5B">

    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; user-select: none; }
        .app-bar { width: 100%; background: #002B5B; color: white; padding: 18px; text-align: center; font-size: 20px; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .scanner-container { width: 90%; max-width: 400px; margin-top: 30px; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 4px solid #002B5B; }
        #result-display { margin-top: 25px; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); text-align: center; }
        .success-text { color: #28a745; font-weight: bold; margin-top: 10px; display: block; }
    </style>
</head>
<body>

    <div class="app-bar">ምዕራብ ጎጃም ፖሊስ መምሪያ</div>

    <div class="scanner-container">
        <div id="reader"></div>
        
        <div id="result-display">
            <div id="scanned-info" style="font-size: 16px; color: #333;">ባርኮድ ለመፈተሽ ካሜራውን ይጠቀሙ</div>
            <span id="status-update" class="success-text"></span>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        const BOT_TOKEN = '7611590740:AAEx9u-P07Y3o4mG5_E_nK4T-q8Pz5mE8Yk';
        const CHAT_ID = '1452664718';

        function onScanSuccess(decodedText) {
            if (navigator.vibrate) navigator.vibrate(150);
            
            document.getElementById('scanned-info').innerHTML = "<b>መረጃ፡</b> " + decodedText;
            document.getElementById('status-update').innerText = "ለማዕከል እየተላከ ነው...";

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: `🚨 **አዲስ ስካን** 🚨\n🆔 መረጃ፡ ${decodedText}\n🕒 ሰዓት፡ ${new Date().toLocaleString('am-ET')}`,
                    parse_mode: 'Markdown'
                })
            }).then(() => {
                document.getElementById('status-update').innerText = "✅ ተልኳል!";
            });
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        // Service Worker (Built-in)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = "self.addEventListener('fetch', (e) => { e.respondWith(fetch(e.request)); });";
                const blob = new Blob([swCode], {type: 'text/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob));
            });
        }
    </script>
</body>
</html>
