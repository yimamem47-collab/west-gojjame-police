<script>
    function login() {
        // ተጠቃሚው የጻፈውን ይቀበላል (ባዶ ቦታ ያጠፋል፣ ወደ ትናንሽ ፊደላት ይቀይራል)
        var user = document.getElementById("username").value.trim().toLowerCase();
        var pass = document.getElementById("password").value.trim();
        var errorElement = document.getElementById("errorMessage");

        errorElement.style.display = "none";

        // የሁሉም ጣቢያዎች ዝርዝር (ሊስት)
        var validUsers = [
            "finote_selam_main", "finote_selam_city", "finote_selam_station1", 
            "jabi_tehnan", "jiga_city", "jiga_zuria", 
            "bure_city", "bure_zuria", 
            "dembacha_city", "dembacha_zuria", 
            "d_shindi", "wemberma", "quch", 
            "sekela", "dega_damot", "quarit", "west_gojjam_hq"
        ];

        // ቼክ የማድረጊያ ሎጂክ (Password: admin)
        if (validUsers.includes(user) && pass === "admin") {
            // ስሙ እና ፓስወርዱ ትክክል ከሆነ ወደ ዳሽቦርድ ይውሰደው
            window.location.href = "dashboard.html";
        } else {
            // ከተሳሳተ ቀዩን ማስጠንቀቂያ ያሳያል
            errorElement.innerText = "የወረዳ ስም ወይም ሚስጥራዊ ቁጥር ተሳስቷል! እባክዎ በትክክል ይሞክሩ።";
            errorElement.style.display = "block";
            document.getElementById("password").value = ""; // ፓስወርዱን ያጠፋል
        }
    }
</script>
