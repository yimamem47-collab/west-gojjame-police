<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ምዕራብ ጎጃም ፖሊስ</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; margin: 0; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 16px; margin: 10px 0; }
        .public-btn { background-color: #28a745; }
        .police-btn { background-color: #0056b3; }
        .back-btn { background-color: #6c757d; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #public-section, #police-section, #scanner-section { display: none; }
        #reader { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div id="main-page" class="box">
    <div style="font-size: 50px;">🇪🇹</div>
    <h2>ምዕራብ ጎጃም ፖሊስ</h2>
    <button class="btn public-btn" onclick="showSection('public-section')">🔴 ለህዝብ (ጥቆማ መላኪያ)</button>
    <button class="btn police-btn" onclick="showSection('police-section')">🔵 ለፖሊስ አባላት (Login/QR)</button>
</div>

<div id="public-section" class="box">
    <h3>🚨 የወንጀል ጥቆማ መላኪያ</h3>
    <input type="text" id="subject" placeholder="የጉዳዩ ርዕስ">
    <textarea id="detail" rows="5" placeholder="ዝርዝር መረጃ..."></textarea>
    <button class="btn public-btn" id="sendBtn" onclick="sendTip()">ጥቆማውን ላክ</button>
    <button class="btn back-btn" onclick="showSection('main-page')">ተመለስ</button>
</div>

<div id="police-section" class="box">
    <h3>🔵 የፖሊስ መግቢያ</h3>
    <input type="text" id="user" placeholder="የመለያ ስም">
    <input type="password" id="pass" placeholder="የይለፍ ቃል">
    <button class="btn police-btn" onclick="checkLogin()">ግባ</button>
    <button class="btn back-btn" onclick="showSection('main-page')">ተመለስ</button>
</div>

<div id="scanner-section" class="box">
    <h3>📷 QR ኮድ ስካነር</h3>
    <div id="reader"></div>
    <p id="result" style="font-weight: bold; color: green;"></p>
    <button class="btn back-btn" onclick="stopScanner()">ተመለስ</button>
</div>
