<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የፖሊስ መግቢያ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .login-btn { width: 98%; padding: 12px; background-color: #0056b3; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔵 የፖሊስ መግቢያ</h2>
    <input type="text" id="username" placeholder="የተጠቃሚ ስም">
    <input type="password" id="password" placeholder="የይለፍ ቃል">
    <button class="login-btn" onclick="alert('ይህ ገጽ በቅርቡ ይከፈታል!')">ግባ</button>
    <br><br>
    <a href="index.html" style="text-decoration:none; color:#666;">⬅️ ተመለስ</a>
</div>
</body>
</html>
