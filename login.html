<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የፖሊስ መግቢያ - West Gojjam Police</title>
    <meta name="description" content="የምዕራብ ጎጃም ዞን ፖሊስ አባላት መግቢያ ገጽ።">
    <meta name="author" content="West Gojjam Police Department">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { color: #003366; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 95%; padding: 12px; background-color: #0056b3; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .error-msg { color: red; font-size: 14px; display: none; margin-top: 10px; }
        .back-link { display: block; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>የፖሊስ መግቢያ</h2>
    <input type="text" id="username" placeholder="የወረዳ ስም (ለምሳሌ፡ quarit)">
    <input type="password" id="password" placeholder="ሚስጥራዊ ቁጥር">
    <p id="error" class="error-msg">የገቡት መረጃ ተሳስቷል!</p>
    <button onclick="checkLogin()">ግባ</button>
    <a href="index.html" class="back-link"> ወደ ዋናው ገጽ ተመለስ</a>
</div>
<script>
    function checkLogin() {
        var user = document.getElementById("username").value.trim().toLowerCase();
        var pass = document.getElementById("password").value.trim();
        var error = document.getElementById("error");
        var validUsers = ["finote_selam", "jabi_tehnan", "jiga", "bure", "dembacha", "d_shindi", "wemberma", "quch", "sekela", "dega_damot", "quarit", "west_gojjam_hq"];
        if (validUsers.includes(user) && pass === "admin") {
            window.location.href = "dashboard.html"; 
        } else {
            error.style.display = "block";
            document.getElementById("password").value = "";
        }
    }
</script>
</body>
</html>
